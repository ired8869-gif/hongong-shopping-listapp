<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쇼핑 리스트</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1d1d1f;
    --muted: #86868b;
    --accent: #007aff;
    --danger: #ff3b30;
    --border: #e5e5ea;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --card: #1c1c1e;
      --text: #f5f5f7;
      --muted: #98989d;
      --border: #2c2c2e;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 40px 16px;
    min-height: 100vh;
  }
  .app {
    width: 100%;
    max-width: 480px;
  }
  h1 {
    font-size: 28px;
    margin: 0 0 20px;
    text-align: center;
  }
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  #item-input {
    flex: 1;
    padding: 12px 14px;
    font-size: 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    color: var(--text);
    outline: none;
  }
  #item-input:focus {
    border-color: var(--accent);
  }
  #add-btn {
    padding: 12px 20px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
  }
  #add-btn:active { opacity: 0.8; }

  .summary {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    color: var(--muted);
    font-size: 14px;
    padding: 0 4px;
  }
  #clear-checked {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 14px;
    cursor: pointer;
    padding: 4px;
  }

  ul#list {
    list-style: none;
    margin: 0;
    padding: 0;
    background: var(--card);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  li.item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  li.item:last-child { border-bottom: none; }

  .checkbox {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    border-radius: 50%;
    border: 2px solid var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
  }
  .checkbox.checked {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-size: 13px;
  }

  .item-text {
    flex: 1;
    font-size: 16px;
    word-break: break-word;
    cursor: pointer;
  }
  .item.checked .item-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  .delete-btn {
    background: none;
    border: none;
    color: var(--danger);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 4px 6px;
    flex-shrink: 0;
  }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 40px 16px;
    font-size: 15px;
  }
</style>
</head>
<body>
  <div class="app">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input id="item-input" type="text" placeholder="아이템 입력 후 Enter" autocomplete="off" />
      <button id="add-btn">추가</button>
    </div>

    <div class="summary">
      <span id="count-text">총 0개</span>
      <button id="clear-checked">체크된 항목 삭제</button>
    </div>

    <ul id="list"></ul>
  </div>

  <script>
    const STORAGE_KEY = 'shopping-list-items';

    function loadItems() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function saveItems(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    let items = loadItems();

    const listEl = document.getElementById('list');
    const inputEl = document.getElementById('item-input');
    const addBtn = document.getElementById('add-btn');
    const countText = document.getElementById('count-text');
    const clearCheckedBtn = document.getElementById('clear-checked');

    function render() {
      listEl.innerHTML = '';

      if (items.length === 0) {
        const empty = document.createElement('li');
        empty.className = 'empty';
        empty.textContent = '아직 담긴 아이템이 없어요. 위에서 추가해보세요!';
        listEl.appendChild(empty);
      } else {
        items.forEach((item) => {
          const li = document.createElement('li');
          li.className = 'item' + (item.checked ? ' checked' : '');

          const checkbox = document.createElement('button');
          checkbox.className = 'checkbox' + (item.checked ? ' checked' : '');
          checkbox.textContent = item.checked ? '✓' : '';
          checkbox.setAttribute('aria-label', '체크');
          checkbox.addEventListener('click', () => toggleItem(item.id));

          const text = document.createElement('span');
          text.className = 'item-text';
          text.textContent = item.text;
          text.addEventListener('click', () => toggleItem(item.id));

          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'delete-btn';
          deleteBtn.textContent = '✕';
          deleteBtn.setAttribute('aria-label', '삭제');
          deleteBtn.addEventListener('click', () => deleteItem(item.id));

          li.appendChild(checkbox);
          li.appendChild(text);
          li.appendChild(deleteBtn);
          listEl.appendChild(li);
        });
      }

      const checkedCount = items.filter((i) => i.checked).length;
      countText.textContent = `총 ${items.length}개 (체크 ${checkedCount}개)`;
    }

    function addItem() {
      const text = inputEl.value.trim();
      if (!text) return;
      items.push({ id: Date.now() + Math.random(), text, checked: false });
      saveItems(items);
      inputEl.value = '';
      render();
      inputEl.focus();
    }

    function toggleItem(id) {
      const item = items.find((i) => i.id === id);
      if (item) item.checked = !item.checked;
      saveItems(items);
      render();
    }

    function deleteItem(id) {
      items = items.filter((i) => i.id !== id);
      saveItems(items);
      render();
    }

    function clearChecked() {
      items = items.filter((i) => !i.checked);
      saveItems(items);
      render();
    }

    addBtn.addEventListener('click', addItem);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addItem();
    });
    clearCheckedBtn.addEventListener('click', clearChecked);

    render();
  </script>
</body>
</html>
